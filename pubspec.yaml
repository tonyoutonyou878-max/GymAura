name: gymsense
description: "AI-Powered Smart Gym Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Firebase Core & Services
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # UI Components
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Navigation
  go_router: ^12.0.0

  # HTTP & Storage
  http: ^1.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.2

  # Local Database
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Image & Camera (for AI Scanner)
  image_picker: ^1.0.0

  # Animations
  lottie: ^2.6.0
  video_player: ^2.8.1

  # Utils
  flutter_svg: ^2.0.0
  uuid: ^4.0.0
  google_generative_ai: ^0.4.7
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
  #   - assets/animations/
  #   - assets/icons/

